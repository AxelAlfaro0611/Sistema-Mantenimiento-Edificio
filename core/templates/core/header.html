{% load static %}

<nav class="navbar navbar-expand navbar-light bg-white topbar mb-4 static-top shadow">
    <button id="sidebarToggleTop" class="btn btn-link d-md-none rounded-circle mr-2" type="button" aria-label="Menú">
        <i class="fa fa-bars"></i>
    </button>

    <a href="{% url 'busqueda-central' %}" class="d-none d-sm-inline-block btn btn-light border small mr-auto ml-md-3 my-2 my-md-0">
        <i class="fas fa-search fa-sm"></i> Búsqueda central
    </a>
    <a href="{% url 'busqueda-central' %}" class="d-sm-none btn btn-link nav-link px-2 mr-auto" title="Búsqueda central" aria-label="Búsqueda central">
        <i class="fas fa-search"></i>
    </a>

    <ul class="navbar-nav ml-auto">
        <li class="nav-item dropdown no-arrow mx-1">
            <a class="nav-link dropdown-toggle" href="#" id="alertsDropdown" role="button" data-toggle="dropdown"
               aria-haspopup="true" aria-expanded="false">
                <i class="fas fa-bell fa-fw"></i>
                <span class="badge badge-danger badge-counter" id="alert-count">0</span>
            </a>
            <div class="dropdown-list dropdown-menu dropdown-menu-right shadow animated--grow-in"
                 aria-labelledby="alertsDropdown">
                <h6 class="dropdown-header">Alertas de mantenimiento</h6>
                <div id="alert-container">
                    <span class="dropdown-item text-center text-gray-500">Sin alertas</span>
                </div>
            </div>
        </li>

        <div class="topbar-divider d-none d-sm-block"></div>

        <li class="nav-item dropdown no-arrow">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
               data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                <span class="mr-2 d-none d-lg-inline text-gray-600 small">{{ request.user.username }}</span>
                <img class="img-profile rounded-circle" src="{% static 'img/undraw_profile.svg' %}">
            </a>
            <div class="dropdown-menu dropdown-menu-right shadow animated--grow-in" aria-labelledby="userDropdown">
                <a class="dropdown-item" href="#" data-toggle="modal" data-target="#logoutModal">
                    <i class="fas fa-sign-out-alt fa-sm fa-fw mr-2 text-gray-400"></i> Cerrar sesión
                </a>
            </div>
        </li>
    </ul>
</nav>

<div class="modal fade" id="logoutModal" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">¿Cerrar sesión?</h5>
                <button class="close" type="button" data-dismiss="modal"><span>×</span></button>
            </div>
            <div class="modal-body">¿Estás seguro de que deseas cerrar sesión?</div>
            <div class="modal-footer">
                <button class="btn btn-secondary" type="button" data-dismiss="modal">Cancelar</button>
                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button class="btn btn-primary" type="submit">Cerrar sesión</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        fetch('/dashboard/alertas/', { credentials: 'same-origin' })
        .then(res => res.ok ? res.json() : null)
        .then(data => {
            if (!data) return;
            document.getElementById('alert-count').textContent = data.cantidad;
            if (data.cantidad > 0) {
                const container = document.getElementById('alert-container');
                container.innerHTML = '';
                data.alertas.forEach(alerta => {
                    const icon = alerta.tipo === 'vencido' ? 'bg-danger' : 'bg-warning';
                    container.insertAdjacentHTML('beforeend', `
                        <a class="dropdown-item d-flex align-items-center" href="/preventivos/">
                            <div class="mr-3"><div class="icon-circle ${icon}">
                                <i class="fas fa-wrench text-white"></i>
                            </div></div>
                            <div>
                                <div class="small text-gray-500">${alerta.fecha}</div>
                                <span class="font-weight-bold">${alerta.equipo}</span>
                                <div class="small">${alerta.mensaje}</div>
                            </div>
                        </a>`);
                });
            }
        });
    });
</script>
