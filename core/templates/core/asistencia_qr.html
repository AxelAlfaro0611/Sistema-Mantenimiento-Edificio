{% extends 'core/base.html' %}

{% block content %}
<div class="container mt-5 text-center">
  <h4 class="mb-4">Marcar asistencia escaneando QR</h4>

  <div class="mb-3">
    <button id="btnIniciarCamara" class="btn btn-success">
      <i class="fas fa-camera"></i> Activar cámara
    </button>
    <button id="btnDetenerCamara" class="btn btn-danger d-none">
      <i class="fas fa-stop-circle"></i> Detener cámara
    </button>
  </div>

  <div id="reader" style="width: 300px; margin: auto; display: none;"></div>

  <!-- Formulario oculto -->
  <form id="formDNI" method="POST" action="{% url 'marcar_asistencia' %}" style="display: none;">
    {% csrf_token %}
    <input type="hidden" name="dni" id="dniQR">
  </form>
</div>
{% endblock %}

{% block extra_js %}
<!-- Librerías necesarias -->
<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
  let qrScanner;

  const btnIniciar = document.getElementById("btnIniciarCamara");
  const btnDetener = document.getElementById("btnDetenerCamara");
  const reader = document.getElementById("reader");

  btnIniciar.addEventListener("click", function () {
    reader.style.display = "block";
    btnIniciar.classList.add("d-none");
    btnDetener.classList.remove("d-none");

    qrScanner = new Html5Qrcode("reader");

    qrScanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },
      (dni) => {
        qrScanner.stop().then(() => {
          reader.style.display = "none";
          btnDetener.classList.add("d-none");
          btnIniciar.classList.remove("d-none");

          // Mostrar confirmación
          Swal.fire({
            icon: 'success',
            title: 'Asistencia registrada',
            text: `DNI escaneado: ${dni}`,
            timer: 2500,
            showConfirmButton: false
          });

          // Enviar formulario oculto
          document.getElementById("dniQR").value = dni;
          document.getElementById("formDNI").submit();
        });
      },
      (error) => {
        // Opcional: console.log("Escaneo fallido: ", error);
      }
    ).catch(err => {
      Swal.fire({
        icon: 'error',
        title: 'No se pudo acceder a la cámara',
        text: 'Verifica los permisos del navegador o que tengas cámara activa.'
      });
    });
  });

  btnDetener.addEventListener("click", function () {
    if (qrScanner) {
      qrScanner.stop().then(() => {
        reader.style.display = "none";
        btnDetener.classList.add("d-none");
        btnIniciar.classList.remove("d-none");
      });
    }
  });
</script>
{% endblock %}
